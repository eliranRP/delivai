services:
  - type: web
    name: delivai-shopify-app
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      cd apps/shopify-app &&
      npx prisma generate &&
      pnpm --filter shopify-app build
    startCommand: cd apps/shopify-app && npx remix-serve ./build/server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_APP_URL
        value: https://delivai-shopify-app.onrender.com
      - key: SHOPIFY_API_KEY
        value: e39564564d687d4fc3d0465f86add31b
      - key: SHOPIFY_SCOPES
        value: read_orders,write_orders,read_customers,write_customers,read_products,read_fulfillments,write_fulfillments
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
