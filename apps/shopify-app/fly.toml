# fly.toml — DelivAI Shopify App (Fly.io deployment)
# Deploy: fly deploy --config fly.toml

app = "delivai-shopify-app"
primary_region = "iad"  # US East — change to match your DB region

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

# Secrets (set via: fly secrets set KEY=value)
# Required:
#   DATABASE_URL            — PostgreSQL connection string (with pgvector)
#   SHOPIFY_API_KEY         — From Shopify Partner Dashboard
#   SHOPIFY_API_SECRET      — From Shopify Partner Dashboard
#   SHOPIFY_APP_URL         — https://delivai-shopify-app.fly.dev
#   ENCRYPTION_KEY          — 32-byte hex (openssl rand -hex 32)
#   SESSION_SECRET          — random 64-char string
# Optional:
#   REDIS_URL               — Upstash Redis URL (for rate limiting + SSE pub/sub)
#   SENTRY_DSN              — Sentry project DSN
#   LOG_LEVEL               — debug | info | warn | error (default: info)

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 3000
    timeout = "5s"
    type = "http"

# Scale up for production traffic:
# fly scale count 2 --region iad
# fly scale vm shared-cpu-2x
