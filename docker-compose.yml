version: "3.9"

# DelivAI — Local development stack
# Usage: docker compose up -d
# Starts: PostgreSQL (with pgvector) + Redis

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: delivai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: delivai
      POSTGRES_PASSWORD: delivai_local
      POSTGRES_DB: delivai_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivai -d delivai_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: delivai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
